name: 근무표 ICS 자동 생성

# 1시간마다 + 수동 실행 시 근무표를 .ics로 생성해 저장소(GitHub Pages)에 반영한다.
on:
  schedule:
    - cron: "0 * * * *"   # 매시 정각(UTC). 구글 캘린더 구독 갱신 주기를 고려한 값.
  workflow_dispatch: {}     # GitHub에서 수동 실행 버튼
  push:
    branches: [main]
    paths:
      - "scripts/generate-ics.mjs"
      - ".github/workflows/generate-ics.yml"

permissions:
  contents: write

concurrency:
  group: generate-ics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ICS 생성
        run: node scripts/generate-ics.mjs

      - name: 변경분 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.ics ics/ || true
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "근무표 ICS 자동 갱신"
            git push
          fi
