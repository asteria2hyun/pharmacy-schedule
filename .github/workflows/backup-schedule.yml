name: 근무표 격주 백업

# 2주에 1회 + 수동 실행 시 근무표를 backup/schedule-latest.json 한 파일에 덮어쓰기 백업.
# (1주는 짧아서 오류를 인지하기 전에 백업이 덮일 수 있어 2주 주기로 운영)
on:
  schedule:
    - cron: "0 18 1,15 * *"  # 매월 1일·15일 18:00 UTC(한국 새벽 3시) ≈ 2주 간격
  workflow_dispatch: {}      # GitHub에서 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: backup-schedule
  cancel-in-progress: true

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 백업 생성
        run: node scripts/backup-schedule.mjs

      - name: 변경분 커밋 (같은 파일 덮어쓰기)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup/schedule-latest.json
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "근무표 주간 백업 갱신"
            git push
          fi
