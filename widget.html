<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f3d2e" />
    <title>근무표 위젯</title>
    <style>
      :root {
        --bg: #ffffff;
        --ink: #16261f;
        --muted: #6b7d75;
        --line: #e3ebe7;
        /* 단(段)별 색: 위치+옅은 배경띠로 종류 구분 (라벨 최소화) */
        --ten-bg: #fff4e2;   --ten-fg: #7a4e12;   /* 10-10 */
        --eight-bg: #e7f6f7; --eight-fg: #176b73; /* 10-8 */
        --staff-bg: #f1edff; --staff-fg: #5846b5; /* 직원 */
        --sun: #d92d20;
        --sat: #1d6fd6;
        --mine-line: #22a06b; /* 내 근무 강조 테두리 */
        --today-line: #e5332b; /* 오늘 날짜: 붉은 테두리로 눈에 띄게 */
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
        -webkit-text-size-adjust: 100%;
      }
      .wrap { padding: 6px 8px 8px; }
      .head {
        display: flex; align-items: baseline; justify-content: space-between;
        margin-bottom: 4px;
      }
      .title { font-size: 14px; font-weight: 800; }
      .sub { font-size: 10px; color: var(--muted); }
      .legend { display: flex; gap: 8px; font-size: 9px; color: var(--muted); margin: 2px 0 5px; }
      .legend span { display: inline-flex; align-items: center; gap: 3px; }
      .legend i { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
      .legend i.ten { background: var(--ten-bg); border: 1px solid var(--ten-fg); }
      .legend i.eight { background: var(--eight-bg); border: 1px solid var(--eight-fg); }
      .legend i.staff { background: var(--staff-bg); border: 1px solid var(--staff-fg); }
      .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
      .dow { font-size: 9px; font-weight: 800; text-align: center; padding: 1px 0; color: var(--muted); }
      .dow.s0 { color: var(--sun); }
      .dow.s6 { color: var(--sat); }
      .cell {
        border: 1px solid var(--line);
        border-radius: 5px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .cell.blank { border: none; }
      .cell.today { border-color: var(--today-line); box-shadow: inset 0 0 0 2px var(--today-line); }
      .cell.today .dnum { color: var(--today-line); }
      .dnum { font-size: 9px; font-weight: 800; line-height: 1.3; text-align: center; padding: 1px 0; }
      .dnum.s0 { color: var(--sun); }
      .dnum.s6 { color: var(--sat); }
      /* 3단: 10-10 / 10-8 / 직원. 각 단 '2줄 고정'으로 모든 칸에서 라인 위치 동일하게 맞춤 */
      .seg {
        padding: 1px 2px;
        font-size: 9px;
        text-align: center;
        overflow: hidden;
      }
      .seg.ten   { background: var(--ten-bg);   color: var(--ten-fg); }
      .seg.eight { background: var(--eight-bg); color: var(--eight-fg); }
      .seg.staff { background: var(--staff-bg); color: var(--staff-fg); }
      /* 각 줄(이름) 고정 높이 — 1명인 날도 빈 줄로 자리를 채워 정렬 일관성 보장 */
      .seg .nm {
        font-weight: 800;
        height: 12px;
        line-height: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .seg .nm.empty { visibility: hidden; }
      .seg .nm.is-mine { text-decoration: underline; text-decoration-color: var(--mine-line); text-decoration-thickness: 1.5px; }
      .seg.mine { box-shadow: inset 0 0 0 1.5px var(--mine-line); border-radius: 2px; }
      .state { font-size: 11px; color: var(--muted); padding: 12px; text-align: center; }
      .err { color: var(--sun); }
      .foot { font-size: 8px; color: var(--muted); text-align: right; margin-top: 3px; }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #14201b; --ink: #e8f0ec; --muted: #9fb3aa; --line: #2a3a33;
          --ten-bg: #3a2f1c;   --ten-fg: #e4b86a;
          --eight-bg: #173034; --eight-fg: #6fd0d6;
          --staff-bg: #262040; --staff-fg: #b8aaff;
          --mine-line: #49d39a; --today-line: #ff5b52;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap"><div id="root"><div class="state">근무표 불러오는 중…</div></div></div>
    <script>
      (function () {
        // 읽기 전용 위젯: Supabase 공유 데이터에서 근무표를 읽어 이달 달력을 그린다.
        // 운영 앱(app.js)·데이터는 절대 건드리지 않는다. (이름·근무종류만 표시)
        var SUPABASE_URL = "https://seqefputbjlxjyvloywk.supabase.co";
        var KEY = "sb_publishable_k8EqPOzPYr6itPaOgFYwCA_39-Zi182";
        var STATE_ID = "shared_schedule";
        var SHIFT = { "10pm": { label: "10-10", cls: "ten" }, "8pm": { label: "10-8", cls: "eight" } };

        function qp(name) {
          try { return new URLSearchParams(location.search).get(name) || ""; } catch (e) { return ""; }
        }
        var MY_NAME = (qp("name") || "").trim();

        function koreaParts() {
          var f = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Seoul", year: "numeric", month: "2-digit", day: "2-digit" });
          var p = {};
          f.formatToParts(new Date()).forEach(function (x) { if (x.type !== "literal") p[x.type] = x.value; });
          return { y: Number(p.year), m: Number(p.month), d: Number(p.day) };
        }
        function pad(n) { return String(n).padStart(2, "0"); }
        function weekday(y, m, d) { return new Date(Date.UTC(y, m - 1, d)).getUTCDay(); }
        function daysInMonth(y, m) { return new Date(Date.UTC(y, m, 0)).getUTCDate(); }
        function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }

        function render(data) {
          var t = koreaParts();
          var y = t.y, m = t.m;
          var emps = {};
          (data.employees || []).forEach(function (e) { emps[e.id] = e.name; });
          var byDate = {};
          (data.schedules || []).forEach(function (s) {
            if (!s.date || s.date.slice(0, 7) !== y + "-" + pad(m)) return;
            (byDate[s.date] = byDate[s.date] || []).push(s);
          });
          var staffByDate = {};
          (data.staffSchedules || []).forEach(function (s) {
            if (!s.date || s.date.slice(0, 7) !== y + "-" + pad(m)) return;
            (staffByDate[s.date] = staffByDate[s.date] || []).push(s);
          });

          var dows = ["일", "월", "화", "수", "목", "금", "토"];
          var html = '<div class="head"><div class="title">' + y + "년 " + m + "월</div>" +
            '<div class="sub">' + (MY_NAME ? esc(MY_NAME) + "님" : "전체") + "</div></div>";
          html += '<div class="legend">' +
            '<span><i class="ten"></i>10-10</span>' +
            '<span><i class="eight"></i>10-8</span>' +
            '<span><i class="staff"></i>직원</span></div>';
          html += '<div class="grid">';
          for (var i = 0; i < 7; i++) html += '<div class="dow s' + i + '">' + dows[i] + "</div>";

          var first = weekday(y, m, 1);
          for (var b = 0; b < first; b++) html += '<div class="cell blank"></div>';

          // 한 단(段)에 들어갈 이름들을 가독성 있게 표현: 2명까지 줄바꿈, 3명 이상은 "김·이 +N" 축약
          // 각 단은 기본 2줄 고정(라인 정렬). 인원이 2명 미만이면 빈 줄로 채우고,
          // 3명 이상이면 축약 없이 그 칸만 줄을 늘려 전부 표시(일시적으로 한 줄 밀림).
          var SEG_MIN_ROWS = 2;
          function namesHtml(names) {
            var rows = names.map(function (n) {
              return '<div class="nm' + (n.mine ? " is-mine" : "") + '">' + esc(n.name) + "</div>";
            });
            while (rows.length < SEG_MIN_ROWS) {
              rows.push('<div class="nm empty">·</div>'); // 빈 줄(자리만 차지, 보이지 않음)
            }
            return rows.join("");
          }
          function pickNames(list, idKey) {
            return list.map(function (s) {
              var nm = emps[s[idKey]] || "";
              return nm ? { name: nm, mine: MY_NAME && nm === MY_NAME } : null;
            }).filter(Boolean);
          }

          var dim = daysInMonth(y, m);
          for (var day = 1; day <= dim; day++) {
            var date = y + "-" + pad(m) + "-" + pad(day);
            var w = weekday(y, m, day);
            var isToday = day === t.d;
            var rxAll = byDate[date] || [];
            var tenNames = pickNames(rxAll.filter(function (s) { return s.shiftType === "10pm"; }), "pharmacistId");
            var eightNames = pickNames(rxAll.filter(function (s) { return s.shiftType === "8pm"; }), "pharmacistId");
            var staffNames = pickNames(staffByDate[date] || [], "staffId");
            function segMine(names) { return names.some(function (n) { return n.mine; }) ? " mine" : ""; }

            html += '<div class="cell' + (isToday ? " today" : "") + '">';
            html += '<div class="dnum s' + w + '">' + day + "</div>";
            html += '<div class="seg ten' + segMine(tenNames) + '">' + namesHtml(tenNames) + "</div>";
            html += '<div class="seg eight' + segMine(eightNames) + '">' + namesHtml(eightNames) + "</div>";
            html += '<div class="seg staff' + segMine(staffNames) + '">' + namesHtml(staffNames) + "</div>";
            html += "</div>";
          }
          html += "</div>";
          var now = koreaParts();
          html += '<div class="foot">갱신 ' + now.m + "/" + now.d + "</div>";
          document.getElementById("root").innerHTML = html;
        }

        function load() {
          var url = SUPABASE_URL + "/rest/v1/app_state?id=eq." + encodeURIComponent(STATE_ID) + "&select=data";
          fetch(url, { headers: { apikey: KEY, Authorization: "Bearer " + KEY }, cache: "no-store" })
            .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(function (rows) {
              var data = rows && rows[0] && rows[0].data;
              if (!data) throw new Error("no-data");
              render(data);
            })
            .catch(function (e) {
              document.getElementById("root").innerHTML =
                '<div class="state err">근무표를 불러오지 못했습니다. 잠시 후 자동으로 다시 시도합니다.</div>';
            });
        }

        load();
        // 위젯 자동 새로고침: 10분마다 + 화면이 다시 보일 때
        setInterval(load, 10 * 60 * 1000);
        document.addEventListener("visibilitychange", function () { if (!document.hidden) load(); });
      })();
    </script>
  </body>
</html>
